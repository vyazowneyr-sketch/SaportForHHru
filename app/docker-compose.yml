services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: psg_user
      POSTGRES_PASSWORD: z123s4567
      POSTGRES_DB: SHR 
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://psg_user:z123s4567@postgres:5432/SHR
    depends_on:
      - postgres

volumes:
  postgres_data: